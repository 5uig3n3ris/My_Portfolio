<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Planner</title>
    <style>
        .planner { max-width: 350px; margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 12px; font-family: sans-serif; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .done { text-decoration: line-through; color: #888; }
        ul { padding: 0; }
        li { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee; }
        span { cursor: pointer; flex-grow: 1; }
        button { cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>

<div class="planner">
    <h2>Academic Planner</h2>
    <input type="text" id="taskInput" placeholder="Add a new task...">
    <button onclick="addTask()">Add</button>
    <ul id="taskList"></ul>
</div>

<script>
    // Load tasks from localStorage on startup
    document.addEventListener('DOMContentLoaded', loadTasks);

    function addTask() {
        const input = document.getElementById("taskInput");
        if (input.value.trim() === "") return;
        
        const task = { text: input.value, done: false };
        createTaskElement(task);
        saveTasks();
        input.value = "";
    }

    function createTaskElement(task) {
        const list = document.getElementById("taskList");
        const li = document.createElement("li");
        
        const span = document.createElement("span");
        span.textContent = task.text;
        if (task.done) span.classList.add("done");
        span.onclick = function() { 
            this.classList.toggle("done"); 
            saveTasks(); 
        };
        
        const btn = document.createElement("button");
        btn.textContent = "x";
        btn.onclick = function() { li.remove(); saveTasks(); };

        li.appendChild(span);
        li.appendChild(btn);
        list.appendChild(li);
    }

    function saveTasks() {
        const tasks = [];
        document.querySelectorAll("#taskList li").forEach(li => {
            tasks.push({
                text: li.querySelector("span").textContent,
                done: li.querySelector("span").classList.contains("done")
            });
        });
        localStorage.setItem("academicTasks", JSON.stringify(tasks));
    }

    function loadTasks() {
        const tasks = JSON.parse(localStorage.getItem("academicTasks") || "[]");
        tasks.forEach(createTaskElement);
    }
</script>

</body>
</html>
